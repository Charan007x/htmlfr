<!DOCTYPE html>
<html>
<head>
    <title>Basic HTML Demo</title>
</head>

<body>

    <!-- 1. Simple HTML Page Structure is shown above (html, head, body) -->

    <!-- 2. HTML Headings -->
    <h1>This is Heading 1</h1>
    <h2>This is Heading 2</h2>
    <h3>This is Heading 3</h3>

    <!-- 3. HTML Paragraph and Line Break -->
    <p>
        This is a paragraph.<br>
        This is after a line break.<br>
        HTML is easy to learn!
    </p>

    <!-- 4. HTML Formatting Tags -->
    <p>
        <b>Bold Text</b><br>
        <i>Italic Text</i><br>
        <u>Underlined Text</u><br>
        <strong>Important Text</strong><br>
        <em>Emphasized Text</em>
    </p>

    <!-- 5. HTML Images -->
    <h3>Image Example:</h3>
    <img src="https://via.placeholder.com/150" alt="Sample Image" width="150" height="150">

    <!-- 6. HTML Hyperlink -->
    <h3>Hyperlink Example:</h3>
    <a href="https://www.google.com" target="_blank">
        Click here to visit Google
    </a>

</body>
</html>
