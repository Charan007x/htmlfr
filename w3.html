<!DOCTYPE html>
<html>
<head>
    <title>Country and City</title>
</head>

<body>

<center>

    <!-- Heading -->
    <h2 style="color:blue;">Select Country</h2>

    <!-- Dropdown -->
    <select onchange="checkcity(this.value)">
        <option>Select</option>
        <option value="India">India</option>
        <option value="China">China</option>    
        <option value="Germany">Germany</option>  
        <option value="Australia">Australia</option>
        <option value="US">US</option>
        <option value="France">France</option>
    </select>

    <br><br>

    <!-- Result Display -->
    <p id="res" style="color:purple; font-size:20px;"></p>

</center>

<!-- JavaScript -->
<script>
function checkcity(val) {

    if(val == "India") {
        document.getElementById("res").innerHTML = "New Delhi<br><img src='india.png' width='300'>";
    }
    else if(val == "China") {
        document.getElementById("res").innerHTML = "Beijing<br><img src='china.png' width='300'>";
    }
    else if(val == "Germany") {
        document.getElementById("res").innerHTML = "Berlin<br><img src='germany.jpg' width='300'>";
    }
    else if(val == "Australia") {
        document.getElementById("res").innerHTML = "Sydney<br><img src='australia.png' width='300'>";
    }
    else if(val == "US") {
        document.getElementById("res").innerHTML = "Washington DC<br><img src='us.png' width='300'>";
    }
    else if(val == "France") {
        document.getElementById("res").innerHTML = "Paris<br><img src='paris.jpg' width='300'>";
    }
}
</script>

</body>
</html>
